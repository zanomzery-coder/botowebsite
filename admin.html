<!DOCTYPE html>
<html lang="kmr" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Down | VIP Admin Key Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap');
        * { font-family: 'Noto Kufi Arabic', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 sm:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- HEADER -->
        <div class="glass-panel p-6 rounded-3xl flex items-center justify-between border-b border-pink-500/30">
            <div>
                <h1 class="text-2xl font-black text-white">Pro-<span class="text-pink-500">Down</span> Admin Portal</h1>
                <p class="text-xs text-slate-400">ڕێڤەبەرایەتیا دروستکرنا کلیلان و چاڤدێریکرنا ئاماران</p>
            </div>
            <span class="bg-pink-500/20 text-pink-400 border border-pink-500/40 text-xs font-black px-4 py-2 rounded-xl">
                <i class="fa-solid fa-user-shield mr-1"></i> Zanyar Al-Mzuri
            </span>
        </div>

        <!-- STATS DASHBOARD -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="glass-panel p-5 rounded-2xl border-l-4 border-purple-500">
                <span class="text-xs text-slate-400 font-bold">تۆمارا بەکارهێنەران</span>
                <div class="text-2xl font-black text-white mt-1" id="statUsers">1,248</div>
            </div>
            <div class="glass-panel p-5 rounded-2xl border-l-4 border-pink-500">
                <span class="text-xs text-slate-400 font-bold">کلیلێن بەرهەڤکری</span>
                <div class="text-2xl font-black text-white mt-1" id="statKeys">0</div>
            </div>
            <div class="glass-panel p-5 rounded-2xl border-l-4 border-emerald-500">
                <span class="text-xs text-slate-400 font-bold">داهاتێ خەمڵێندراو</span>
                <div class="text-2xl font-black text-emerald-400 mt-1">$4,850</div>
            </div>
        </div>

        <!-- KEY GENERATOR SECTION -->
        <div class="glass-panel p-6 rounded-3xl space-y-5">
            <h2 class="text-lg font-black text-white"><i class="fa-solid fa-key text-pink-500 ml-2"></i> دروستکرنا کلیلا تایبەت (Generate Key)</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">جۆرێ پاکێجێ هەڵبژێرە:</label>
                    <select id="pkgType" class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-xs font-bold outline-none focus:border-pink-500">
                        <option value="PLUS">Plus 2K (60fps)</option>
                        <option value="PREMIUM">Premium 8K (120fps + Dolby Vision)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">ماوەیێ ئەکتیڤبوونێ:</label>
                    <select id="pkgDuration" class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-xs font-bold outline-none focus:border-pink-500">
                        <option value="30">هەیڤانە (30 ڕۆژ)</option>
                        <option value="365">ساڵانە (365 ڕۆژ)</option>
                    </select>
                </div>
            </div>

            <button onclick="generateAdminKey()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 font-black text-xs sm:text-sm py-3.5 rounded-xl transition shadow-lg shadow-pink-500/20 hover:opacity-90">
                <i class="fa-solid fa-wand-magic-sparkles ml-1"></i> دروستکرنا کلیلا ئۆتۆماتیکی (Generate VIP Key)
            </button>
        </div>

        <!-- GENERATED KEYS TABLE -->
        <div class="glass-panel p-6 rounded-3xl space-y-4">
            <h2 class="text-lg font-black text-white"><i class="fa-solid fa-list-check text-purple-400 ml-2"></i> لیستا کلیلێن چالاککراو</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead>
                        <tr class="border-b border-white/10 text-slate-400">
                            <th class="pb-3">کلیل (Key Code)</th>
                            <th class="pb-3">پاکێج</th>
                            <th class="pb-3">ماوە</th>
                            <th class="pb-3">کردار</th>
                        </tr>
                    </thead>
                    <tbody id="keyList" class="divide-y divide-white/5 font-mono">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let generatedKeysCount = 0;

        function generateAdminKey() {
            const pkg = document.getElementById('pkgType').value;
            const duration = document.getElementById('pkgDuration').value;
            
            // Generate unique format: PRO-PLUS-8392-X920 or PRO-PREM-9102-Z718
            const randomCode1 = Math.floor(1000 + Math.random() * 9000);
            const randomCode2 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const fullKey = `PRO-${pkg}-${randomCode1}-${randomCode2}`;

            // Save to LocalStorage DB
            let existingKeys = JSON.parse(localStorage.getItem('prodown_keys') || '[]');
            existingKeys.push({ key: fullKey, pkg: pkg, duration: duration, used: false });
            localStorage.setItem('prodown_keys', JSON.stringify(existingKeys));

            generatedKeysCount++;
            document.getElementById('statKeys').innerText = existingKeys.length;

            renderKeys();
        }

        function renderKeys() {
            const list = document.getElementById('keyList');
            let existingKeys = JSON.parse(localStorage.getItem('prodown_keys') || '[]');
            list.innerHTML = '';

            existingKeys.reverse().forEach((item, index) => {
                list.innerHTML += `
                    <tr class="hover:bg-slate-900/50">
                        <td class="py-3 font-bold text-pink-400">${item.key}</td>
                        <td class="py-3"><span class="bg-purple-900/40 text-purple-300 px-2 py-1 rounded-md text-[10px] font-bold">${item.pkg}</span></td>
                        <td class="py-3 text-slate-300">${item.duration} ڕۆژ</td>
                        <td class="py-3">
                            <button onclick="navigator.clipboard.writeText('${item.key}')" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1 rounded-lg text-[10px] font-sans">
                                <i class="fa-solid fa-copy"></i> کۆپی
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        window.onload = renderKeys;
    </script>
</body>
</html>
